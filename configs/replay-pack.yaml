manifest_output: data/samples/replay-pack-manifest.json
policy:
  live_bounded_export: live bounded export captured from observability/control-plane truth; refreshable out-of-band
  retained_fixture: versioned local replay seed for hardening and deterministic tests
  derived_artifact: generated by scripts/pipeline; never hand-edited
datasets:
  - name: metrics_windows
    output: data/samples/replay/metrics_windows.jsonl
    sources:
      - path: data/samples/raw/metrics_windows.jsonl
        class: live_bounded_export
      - path: data/samples/fixtures/metrics_windows.retained.jsonl
        class: retained_fixture
  - name: log_evidence
    output: data/samples/replay/log_evidence.jsonl
    sources:
      - path: data/samples/raw/log_evidence.jsonl
        class: live_bounded_export
      - path: data/samples/fixtures/log_evidence.retained.jsonl
        class: retained_fixture
  - name: trace_evidence
    output: data/samples/replay/trace_evidence.jsonl
    sources:
      - path: data/samples/raw/trace_evidence.jsonl
        class: live_bounded_export
      - path: data/samples/fixtures/trace_evidence.retained.jsonl
        class: retained_fixture
  - name: topology
    output: data/samples/replay/topology.jsonl
    sources:
      - path: data/samples/raw/topology.jsonl
        class: live_bounded_export
      - path: data/samples/fixtures/topology.retained.jsonl
        class: retained_fixture
  - name: memory_summaries
    output: data/samples/replay/memory_summaries.jsonl
    sources:
      - path: data/samples/raw/memory_summaries.jsonl
        class: retained_fixture
  - name: historical_incidents
    output: data/eval/replay/historical_incidents.jsonl
    sources:
      - path: data/eval/historical_incidents.jsonl
        class: retained_fixture
      - path: data/eval/fixtures/historical_incidents.retained.jsonl
        class: retained_fixture
  - name: training_examples
    output: data/eval/replay/training_examples.jsonl
    sources:
      - path: data/eval/training_examples.jsonl
        class: retained_fixture
      - path: data/eval/fixtures/training_examples.retained.jsonl
        class: retained_fixture
  - name: outcomes
    output: data/eval/replay/outcomes.jsonl
    sources:
      - path: data/eval/outcomes.jsonl
        class: retained_fixture
      - path: data/eval/fixtures/outcomes.retained.jsonl
        class: retained_fixture
  - name: manual_teacher_judgements
    output: data/eval/replay/manual_teacher_judgements.jsonl
    sources:
      - path: data/eval/manual_teacher_judgements.jsonl
        class: retained_fixture
derived_artifacts:
  - path: data/samples/candidate-windows.jsonl
    class: derived_artifact
  - path: data/samples/incident-packets.jsonl
    class: derived_artifact
  - path: data/samples/retrieval-results.jsonl
    class: derived_artifact
  - path: data/eval/student-scores.jsonl
    class: derived_artifact
  - path: data/eval/teacher-judgements.jsonl
    class: derived_artifact
  - path: data/eval/triage-decisions.jsonl
    class: derived_artifact
  - path: data/eval/metrics-summary.json
    class: derived_artifact
  - path: data/reports/daily-shadow-report.json
    class: derived_artifact
  - path: data/reports/daily-shadow-report.md
    class: derived_artifact
  - path: data/eval/retrieval-index.json
    class: derived_artifact
  - path: data/eval/label-ledger.json
    class: derived_artifact
  - path: data/eval/calibration-report.json
    class: derived_artifact
  - path: data/eval/teacher-request-ledger.jsonl
    class: derived_artifact
  - path: data/eval/teacher-review-ledger.jsonl
    class: derived_artifact
  - path: data/eval/teacher-fallback-ledger.jsonl
    class: derived_artifact
  - path: data/eval/enrichment-usage.json
    class: derived_artifact
  - path: data/eval/control-plane-live-readback.json
    class: derived_artifact
